<div id="assentos-selecionados">Assentos selecionados: Nenhum</div>

<div class="selecionar-ingresso">
    <button>Selecionar Ingresso →</button>
  </div>

 
    <script>
       const assentos = document.querySelectorAll('.assento');

    function atualizarInfo() {
  const selecionados = [];

  assentos.forEach(assento => {
    if (assento.style.backgroundColor === 'blue') {
      const letra = assento.closest('.linha').querySelector('.letra').textContent;
      const numero = assento.textContent;
      selecionados.push(letra + numero);
    }
  });

  const info = document.getElementById('assentos-selecionados');
  if (selecionados.length === 0) {
    info.textContent = 'Assentos selecionados: nenhum';
  } else {
    info.textContent = 'Assentos selecionados: ' + selecionados.join(', ');
  }
}

assentos.forEach(assento => {
  assento.addEventListener('click', () => {
    if (assento.style.backgroundColor === 'blue') {
      assento.style.backgroundColor = '';
      assento.style.color = '';
    } else {
      assento.style.backgroundColor = 'blue';
      assento.style.color = 'white';
    }

    atualizarInfo(); // atualiza o texto toda vez que clicar
  });
});
    </script>
